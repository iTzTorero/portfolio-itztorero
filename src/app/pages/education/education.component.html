<section class="head">
  <p class="kicker">{{ "education.kicker" | transloco }}</p>
  <h1 class="title">{{ "education.title" | transloco }}</h1>
  <p class="subtitle">{{ "education.subtitle" | transloco }}</p>
</section>

<section class="timeline" aria-label="Education timeline">
  <div class="item" *ngFor="let e of items(); let i = index">
    <div class="dot"></div>

    <div class="card">
      <div class="top">
        <div>
          <h2 class="role">{{ t(e.title) }}</h2>

          <div class="meta">
            <span class="company">{{ t(e.school) }}</span>

            <span class="sep">•</span>
            <span>{{ formatRange(e.start, e.end) }}</span>

            <span class="sep" *ngIf="e.location">•</span>
            <span *ngIf="e.location">{{ t(e.location) }}</span>

            <span class="sep" *ngIf="e.type">•</span>
            <span *ngIf="e.type">{{ t(e.type) }}</span>
          </div>
        </div>

        <button class="btn" type="button" (click)="toggle(i)">
          {{
            isExpanded(i)
              ? ("education.less" | transloco)
              : ("education.more" | transloco)
          }}
        </button>
      </div>

      <p class="summary">{{ t(e.summary) }}</p>

      <ul class="list" *ngIf="isExpanded(i) && tArr(e.highlights).length">
        <li *ngFor="let h of tArr(e.highlights)">{{ h }}</li>
      </ul>

      <div class="pills" *ngIf="e.focus?.length">
        <span class="pill" *ngFor="let f of e.focus">{{ f }}</span>
      </div>
    </div>
  </div>
</section>

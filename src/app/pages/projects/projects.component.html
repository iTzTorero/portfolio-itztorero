<section class="head">
  <p class="kicker">{{ "projects.kicker" | transloco }}</p>
  <h1 class="title">{{ "projects.title" | transloco }}</h1>
  <p class="subtitle">
    {{ "projects.subtitle" | transloco }}
  </p>

  <div class="controls">
    <input
      class="search"
      type="text"
      [value]="query()"
      (input)="query.set($any($event.target).value || '')"
      [placeholder]="'projects.searchPlaceholder' | transloco"
      [attr.aria-label]="'projects.searchAria' | transloco"
    />

    <button class="btn" type="button" (click)="clear()">
      {{ "projects.clear" | transloco }}
    </button>
  </div>

  <div class="filters" aria-label="Project filters">
    <button
      class="pill"
      type="button"
      [class.active]="activeTag() === null"
      (click)="setTag(null)"
    >
      {{ "projects.filters.all" | transloco }}
    </button>

    <button
      class="pill"
      type="button"
      *ngFor="let t of tags()"
      [class.active]="activeTag() === t"
      (click)="setTag(t)"
    >
      {{ t }}
    </button>
  </div>
</section>

<section class="grid" aria-label="Project list">
  <a
    class="card"
    *ngFor="let p of filtered()"
    [routerLink]="['/projects', p.slug]"
  >
    <div class="card-top">
      <h3>{{ t(p.name) }}</h3>
      <span class="arrow">→</span>
    </div>

    <p class="summary">{{ t(p.summary) }}</p>

    <div class="meta">
      <span class="chip" *ngFor="let s of p.stack">{{ s }}</span>
    </div>

    <div class="links">
      <span class="link" *ngIf="p.github">
        {{ "projects.links.github" | transloco }}
      </span>

      <span class="link" *ngIf="p.demo">
        {{ "projects.links.demo" | transloco }}
      </span>
    </div>
  </a>
</section>
